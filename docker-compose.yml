services:
  db:
    image: pgvector/pgvector:pg16
    container_name: chatbsa-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-chatbsa_db}
    ports:
      - "5441:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - chatbsa-network
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chatbsa-web
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      # Connects to the 'db' service on port 5432 inside the Docker network
      - PG_HOST=db
      - PG_PORT=5432
      - PG_USER=${PG_USER:-postgres}
      - PG_PASSWORD=${PG_PASSWORD:-password}
      - PG_DATABASE=${PG_DATABASE:-chatbsa_db}
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_PUBLISHABLE_OR_ANON_KEY=${NEXT_PUBLIC_SUPABASE_PUBLISHABLE_OR_ANON_KEY}
      # Point to host's Ollama instance (GPU accelerated)
      - OLLAMA_API_BASE=${OLLAMA_API_BASE:-http://host.docker.internal:11434}
      - OLLAMA_MODEL_NAME=${OLLAMA_MODEL_NAME:-scb10x/typhoon2.5-qwen3-4b}
      - RAG_EMBEDDING_BATCH_SIZE=${RAG_EMBEDDING_BATCH_SIZE:-15}
    depends_on:
      - db
    networks:
      - chatbsa-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  chatbsa-network:
    driver: bridge
